<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Harvisha Pictures - Luxury Wedding Photography & Cinematic Filmmaking based in Kolkata.">
    <title>Harvisha Pictures | Wedding Photography Kolkata</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fdfbf7; 
            color: #111;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            transition: all 0.3s ease;
        }

        .logo img {
            max-height: 50px; 
            width: auto;
            display: block;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            margin-left: 25px;
            color: #111;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #777;
        }

        .hero {
            height: 100vh;
            min-height: 500px;
            /* Updated the folder name to "Images" with a capital I to avoid case-sensitivity errors */
            background: linear-gradient(rgba(0, 0, 0, .5), rgba(0, 0, 0, .5)),
                url("Images/BG.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-family: "Playfair Display", serif;
            font-size: 70px;
            margin-bottom: 20px;
            opacity: 0;
            animation: slideUpFade 1s ease forwards 0.2s;
        }

        .hero p {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0;
            animation: slideUpFade 1s ease forwards 0.5s;
        }

        .hero .btn {
            opacity: 0;
            animation: slideUpFade 1s ease forwards 0.8s;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            background: #111;
            color: white;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            background: #333;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .section {
            padding: 100px 8%;
        }

        .bg-cream {
            background-color: #f7eed8; 
        }

        .section-title {
            text-align: center;
            font-family: "Playfair Display", serif;
            font-size: 42px;
            margin-bottom: 50px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .films {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        iframe {
            width: 100%;
            height: 250px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .packages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, .12);
        }

        .card h3 {
            font-family: "Playfair Display", serif;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .testimonials-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .testimonials-header .section-title {
            margin-bottom: 0;
        }

        .client-stat {
            background: #d4af37;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .testimonial-card p {
            font-style: italic;
            color: #555;
            margin: 15px 0;
            font-size: 15px;
        }

        .testimonial-card .stars {
            color: #d4af37;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .testimonial-card h4 {
            font-family: "Playfair Display", serif;
            font-size: 18px;
            color: #111;
        }

        .about {
            max-width: 900px;
            margin: auto;
            text-align: center;
            font-size: 18px;
        }

        .contact {
            text-align: center;
        }

        .contact p {
            margin-bottom: 10px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 50px;
        }

        .whatsapp {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            animation: pulse 2s infinite;
            z-index: 999;
        }

        .whatsapp:hover {
            transform: scale(1.1);
            animation: none;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
